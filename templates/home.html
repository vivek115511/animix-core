<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animix | Pro Media Repurposer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-3xl mx-auto py-12 px-4">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">Animix</h1>
            <p class="text-slate-500 text-lg">Select your footage, preview the timeline, and export.</p>
        </div>

        <form action="/upload" method="post" enctype="multipart/form-data" class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="p-8 border-b border-dashed border-slate-200">
                <label for="v_up" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-blue-200 rounded-xl cursor-pointer hover:bg-blue-50">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <i class="fas fa-cloud-upload-alt text-blue-500 text-3xl mb-2"></i>
                        <p id="fname" class="text-sm text-blue-600 font-semibold">Click to select video</p>
                    </div>
                    <input type="file" id="v_up" name="video_file" class="hidden" required onchange="document.getElementById('fname').innerText = 'Selected: ' + this.files[0].name" />
                </label>
            </div>

            <div class="p-8 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Start (sec)</label>
                        <input type="number" name="start_time" value="0" class="w-full p-3 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">End (sec)</label>
                        <input type="number" name="end_time" value="5" class="w-full p-3 border rounded-lg">
                    </div>
                </div>

                <div class="bg-blue-50 rounded-xl p-6 border border-blue-100">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-2">Export Type</label>
                            <select name="export_type" class="w-full p-2.5 border rounded-lg">
                                <option value="video">Video (.mp4)</option>
                                <option value="audio">Audio Only (.mp3)</option>
                                <option value="gif">Meme (.gif)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-2">Aspect Ratio</label>
                            <select name="aspect_ratio" class="w-full p-2.5 border rounded-lg">
                                <option value="landscape">Keep Original Size</option>
                                <option value="vertical">Vertical (9:16)</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-6">
                        <label class="block text-xs font-bold text-slate-600 mb-2">Quality</label>
                        <select name="quality" class="w-full p-2.5 border rounded-lg">
                            <option value="720p">High Quality (720p)</option>
                            <option value="480p">Standard (480p)</option>
                        </select>
                    </div>

                    <div class="mt-6 space-y-3">
                        <label class="flex items-center text-sm font-medium">
                            <input type="checkbox" name="remove_audio" value="true" class="mr-3"> Mute Video
                        </label>
                        <label class="flex items-center text-sm font-medium">
                            <input type="checkbox" name="generate_thumb" value="true" checked class="mr-3"> Generate Thumbnail
                        </label>
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl">
                    <i class="fas fa-bolt mr-2 text-yellow-400"></i> Process Creator Media
                </button>
            </div>
        </form>
    </div>
</body>
</html>
