<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animix | Pro Media Repurposer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-3xl mx-auto py-12 px-4">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">Animix</h1>
            <p class="text-slate-500 text-lg">Select your footage, preview the timeline, and export.</p>
        </div>

        <form action="/upload" method="post" enctype="multipart/form-data" class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
            
            <div class="p-8 border-b border-dashed border-slate-200">
                <label for="video_upload" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-blue-200 rounded-xl cursor-pointer hover:bg-blue-50 transition-colors">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <i class="fas fa-cloud-upload-alt text-blue-500 text-3xl mb-2"></i>
                        <p class="text-sm text-blue-600 font-semibold" id="file-name-display">Click to select video</p>
                        <p class="text-[10px] text-slate-400 mt-1">MP4, MOV, or AVI (Max 10MB recommended)</p>
                    </div>
                    <input type="file" id="video_upload" name="video_file" class="hidden" required onchange="updateFileName(this)" />
                </label>
            </div>

            <div class="p-8 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Start (sec)</label>
                        <input type="number" name="start_time" value="0" class="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">End (sec)</label>
                        <input type="number" name="end_time" value="5" class="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="bg-blue-50/50 rounded-xl p-6 border border-blue-100">
                    <div class="flex items-center mb-4">
                        <span class="bg-blue-600 text-white text-[10px] font-black px-2 py-1 rounded mr-2 uppercase tracking-widest">PRO</span>
                        <h2 class="text-blue-900 font-bold uppercase tracking-tight text-sm">Creator Tools</h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-2">Export Type</label>
                            <select name="export_type" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm">
                                <option value="video">Video (.mp4)</option>
                                <option value="audio">Audio Only (.mp3)</option>
                                <option value="gif">Meme (.gif)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-2">Aspect Ratio</label>
                            <select name="aspect_ratio" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm">
                                <option value="landscape">Keep Original Size</option>
                                <option value="vertical">Vertical (9:16)</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-6">
                        <label class="block text-xs font-bold text-slate-600 mb-2">Video Quality (File Size)</label>
                        <select name="quality" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm">
                            <option value="720p">High Quality
