<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animix | Core Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        <div class="bg-slate-900 p-5 text-center">
            <h1 class="text-2xl font-black text-white uppercase tracking-tighter">Animix <span class="text-blue-400">Core</span></h1>
        </div>

        <form action="/upload" method="post" enctype="multipart/form-data" class="p-6 space-y-5">
            <label id="upload-label" for="v_up" class="block w-full border-2 border-dashed border-slate-300 rounded-2xl p-6 text-center cursor-pointer hover:bg-slate-50 transition-all">
                <i class="fas fa-video text-3xl text-slate-400 mb-2"></i>
                <p id="fname" class="text-sm font-bold text-slate-600">Click to Select Video</p>
                <input type="file" id="v_up" name="video_file" class="hidden" accept="video/*" required onchange="previewVideo(this)" />
            </label>

            <div id="preview-container" class="hidden w-full bg-black rounded-2xl overflow-hidden shadow-inner aspect-video">
                <video id="video-preview" controls class="w-full h-full"></video>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input type="number" name="start_time" value="0" placeholder="Start (sec)" class="w-full bg-slate-50 border p-3 rounded-xl font-bold">
                <input type="number" name="end_time" value="5" placeholder="End (sec)" class="w-full bg-slate-50 border p-3 rounded-xl font-bold">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <select name="export_type" class="w-full bg-white border p-3 rounded-xl text-sm font-bold">
                    <option value="video">Video (.mp4)</option>
                    <option value="audio">Audio (.mp3)</option>
                </select>
                <select name="aspect_ratio" class="w-full bg-white border p-3 rounded-xl text-sm font-bold">
                    <option value="landscape">Landscape</option>
                    <option value="vertical">Vertical (9:16)</option>
                </select>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 flex justify-center">
                <label class="flex items-center text-sm font-bold text-slate-700 cursor-pointer">
                    <input type="checkbox" name="remove_audio" value="true" class="mr-2 w-5 h-5 rounded text-blue-600"> Mute Audio
                </label>
            </div>

            <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-2xl uppercase tracking-widest flex items-center justify-center">
                <i class="fas fa-bolt mr-3"></i> Start Rendering
            </button>
        </form>

        <!-- Placeholder for Ads -->
        <div class="p-4 bg-slate-50 border-t text-center text-[10px] text-slate-400 font-bold uppercase tracking-widest">
            Ad Space (Ready for AdSense)
        </div>
    </div>

    <script>
        function previewVideo(input) {
            const file = input.files[0];
            const preview = document.getElementById('video-preview');
            const container = document.getElementById('preview-container');
            if (file) {
                const url = URL.createObjectURL(file);
                preview.src = url;
                container.classList.remove('hidden');
                document.getElementById('fname').innerText = "Ready: " + file.name;
            }
        }
    </script>
</body>
</html>
