<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Export | Animix</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-slate-800 rounded-3xl p-8 text-center">
        <h2 class="text-2xl font-bold mb-6">Success!</h2>
        {% if thumb_name %}
        <img src="/videos/{{ thumb_name }}" class="w-full rounded-xl mb-6 border border-slate-700">
        {% endif %}
        <a href="/videos/{{ video_name }}" download class="block w-full bg-blue-600 py-4 rounded-xl font-bold mb-4">Download Result</a>
        <a href="/" class="text-slate-400 text-sm">Start New Project</a>
    </div>
</body>
</html>
